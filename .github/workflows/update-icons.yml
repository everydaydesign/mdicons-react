name: Update MDI icons

# Weekly (and on-demand): pull the latest @mdi/svg, regenerate the barrel, and open a PR if the
# icon set changed. Merge the PR to ship the new icons (publish on release).
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun add -D @mdi/svg@latest
      - run: bun run generate
      - name: Open PR if icons changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update MDI icons from @mdi/svg"
          title: "Update MDI icons"
          body: "Automated: regenerated the barrel from the latest @mdi/svg."
          branch: update-mdi-icons
          add-paths: |
            src/index.ts
            package.json
            bun.lock
